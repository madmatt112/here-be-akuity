apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addon-ingress-nginx
  namespace: argocd
spec:
  goTemplate: false
  generators:
  - clusters:
      selector:
        matchExpressions:
        - {key: akuity.io/argo-cd-cluster-name, operator: NotIn, values: [in-cluster]}
        - {key: env, operator: In, values: [dev, prod]}
  template:
    metadata:
      name: 'ingress-nginx-{{name}}'
      labels:
        addon: ingress-nginx
        env: '{{metadata.labels.env}}'
      annotations:
        kargo.akuity.io/authorized-stage: 'platform-addons:eks-us-west-1-{{metadata.labels.env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/madmatt112/here-be-akuity
        targetRevision: 'addons/{{metadata.labels.env}}'
        path: .
      destination:
        name: '{{name}}'
        namespace: ingress-nginx
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true

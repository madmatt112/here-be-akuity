apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook
  namespace: argocd
spec:
  goTemplate: false
  generators:
  - clusters:
      selector:
        matchExpressions:
        # Never target the Akuity-hosted control-plane cluster.
        - {key: akuity.io/argo-cd-cluster-name, operator: NotIn, values: [in-cluster]}
        # Only clusters that declare an env (dev/prod) run guestbook.
        - {key: env, operator: In, values: [dev, prod]}
  template:
    metadata:
      # One Application per cluster, e.g. guestbook-eks-us-west-1-dev.
      name: 'guestbook-{{name}}'
      labels:
        app: guestbook
        # The env Stage's argocd-update fans out to every app with this tier label.
        env: '{{metadata.labels.env}}'
      annotations:
        # Authorize the tier's Stage (dev or prod) to update this Application.
        kargo.akuity.io/authorized-stage: 'kargo-simple:{{metadata.labels.env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/madmatt112/here-be-akuity
        # All clusters in a tier track the same rendered branch; the Stage renders
        # once and syncs them together.
        targetRevision: 'appenv/{{metadata.labels.env}}'
        path: .
      destination:
        name: '{{name}}'
        namespace: 'guestbook-simple-{{metadata.labels.env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true

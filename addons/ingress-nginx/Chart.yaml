apiVersion: v2
name: ingress-nginx-addon
description: Umbrella chart wrapping ingress-nginx for RMP rendering via Kargo
type: application
version: 0.1.0
# Baseline version. Kargo's helm-update-chart step pins this to the version in
# the Freight being promoted before helm-template renders it.
dependencies:
- name: ingress-nginx
  repository: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3

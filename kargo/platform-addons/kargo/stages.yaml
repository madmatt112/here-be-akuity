# Gated fan-out for the ingress-nginx add-on.
#
#   Warehouse (ingress-nginx)
#      |
#     [dev]  <- pure gate: freight enters the dev tier (no deploy)
#      |  +-- eks-us-west-1-dev   (renders + argocd-update -> this cluster)
#      |  +-- eks-us-east-1-dev   (renders + argocd-update -> this cluster)
#      |
#     [prod] <- pure gate: sources from [dev]; freight enters the prod tier
#         +-- eks-us-west-1-prod  (PR-gated render + argocd-update -> this cluster)
#         +-- eks-us-east-1-prod  (PR-gated render + argocd-update -> this cluster)
#
# The dev/prod gates are control-flow stages with no promotion steps; promoting
# freight into them is a no-op that only marks the tier as reached, making that
# freight eligible for the per-cluster deploy stages that source from the gate.
# Each deploy stage renders to its own addons/<cluster> branch and updates only
# its cluster's Application (selected by the `cluster` label the ApplicationSet
# stamps). Prod-tier deploys are PR-gated into their branch.
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: platform-addons
  annotations:
    kargo.akuity.io/color: blue
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: ingress-nginx
    sources:
      direct: true
  # Pure gate: no steps. Promotion just records that freight reached the dev tier.
  promotionTemplate:
    spec:
      steps: []
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: platform-addons
  annotations:
    kargo.akuity.io/color: indigo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: ingress-nginx
    sources:
      # Freight must clear the dev gate before it is eligible for the prod tier.
      stages:
      - dev
  # Pure gate: no steps. Promotion just records that freight reached the prod tier.
  promotionTemplate:
    spec:
      steps: []
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: eks-us-west-1-dev
  namespace: platform-addons
  annotations:
    kargo.akuity.io/color: red
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: ingress-nginx
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/madmatt112/here-be-akuity
      - name: addonChartRepo
        value: https://kubernetes.github.io/ingress-nginx
      - name: cluster
        value: eks-us-west-1-dev
      - name: targetBranch
        value: addons/eks-us-west-1-dev
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: ${{ vars.targetBranch }}
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: helm-update-chart
        as: update-chart
        config:
          path: ./src/app/platform-addons/ingress-nginx
          charts:
          - repository: ${{ vars.addonChartRepo }}
            name: ingress-nginx
            version: ${{ chartFrom(vars.addonChartRepo, "ingress-nginx").Version }}
      - uses: helm-template
        config:
          path: ./src/app/platform-addons/ingress-nginx
          releaseName: ingress-nginx
          namespace: ingress-nginx
          kubeVersion: "1.30.0"
          valuesFiles:
          - ./src/app/platform-addons/ingress-nginx/values.yaml
          - ./src/app/platform-addons/ingress-nginx/dev-values.yaml
          ignoreMissingValueFiles: true
          buildDependencies: true
          includeCRDs: true
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: ${{ outputs['update-chart'].commitMessage }}
      - uses: git-push
        config:
          path: ./out
          targetBranch: ${{ vars.targetBranch }}
      - uses: argocd-update
        config:
          apps:
          - selector:
              matchLabels:
                addon: ingress-nginx
                cluster: ${{ vars.cluster }}
            sources:
            - repoURL: ${{ vars.gitRepo }}
              desiredRevision: ${{ outputs.commit.commit }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:

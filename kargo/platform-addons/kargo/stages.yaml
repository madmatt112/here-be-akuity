---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: eks-us-west-1-prod
  namespace: platform-addons
  annotations:
    kargo.akuity.io/color: green
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: ingress-nginx
    sources:
      stages:
      - prod
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/madmatt112/here-be-akuity
      - name: addonChartRepo
        value: https://kubernetes.github.io/ingress-nginx
      - name: cluster
        value: eks-us-west-1-prod
      - name: targetBranch
        value: addons/eks-us-west-1-prod
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: ${{ vars.targetBranch }}
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: helm-update-chart
        as: update-chart
        config:
          path: ./src/app/platform-addons/ingress-nginx
          charts:
          - repository: ${{ vars.addonChartRepo }}
            name: ingress-nginx
            version: ${{ chartFrom(vars.addonChartRepo, "ingress-nginx").Version }}
      - uses: helm-template
        config:
          path: ./src/app/platform-addons/ingress-nginx
          releaseName: ingress-nginx
          namespace: ingress-nginx
          kubeVersion: "1.30.0"
          valuesFiles:
          - ./src/app/platform-addons/ingress-nginx/values.yaml
          - ./src/app/platform-addons/ingress-nginx/prod-values.yaml
          ignoreMissingValueFiles: true
          buildDependencies: true
          includeCRDs: true
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: ${{ outputs['update-chart'].commitMessage }}
      # PR-gate prod: push to a generated branch, open a PR into the cluster branch.
      - uses: git-push
        as: push
        config:
          path: ./out
          generateTargetBranch: true
      - uses: git-open-pr
        as: open-pr
        config:
          repoURL: ${{ vars.gitRepo }}
          sourceBranch: ${{ outputs.push.branch }}
          targetBranch: ${{ vars.targetBranch }}
      - uses: git-wait-for-pr
        as: wait-for-pr
        if: ${{ status('open-pr') != 'Skipped' }}
        config:
          repoURL: ${{ vars.gitRepo }}
          prNumber: ${{ outputs['open-pr'].pr.id }}
      - uses: argocd-update
        config:
          apps:
          - selector:
              matchLabels:
                addon: ingress-nginx
                cluster: ${{ vars.cluster }}
            sources:
            - repoURL: ${{ vars.gitRepo }}
              desiredRevision: ${{ outputs['wait-for-pr']?.commit ?? outputs.commit.commit }}
---

# Guestbook (kargo-simple): a two-stage env pipeline that abstracts clusters away
# from the developer.
#
#   Warehouse (guestbook image)
#      |
#     [dev]   renders env/dev once -> pushes env/dev -> syncs ALL dev clusters
#      |      (promotion succeeds only when every dev cluster is Synced/Healthy)
#      v
#     [prod]  renders env/prod once -> pushes env/prod -> syncs ALL prod clusters
#
# Contrast with platform-addons, where a stage IS a single cluster and the
# operator promotes cluster-by-cluster. Here a stage is an ENVIRONMENT: one
# promotion fans out to every cluster in the tier. Each per-cluster Application
# (stamped by the ApplicationSet) tracks the shared per-env branch and is selected
# by the argocd-update step's `app=guestbook, env=<tier>` label match.
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-simple
  annotations:
    kargo.akuity.io/color: red
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: guestbook
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/madmatt112/here-be-akuity
      - name: imageRepo
        value: ghcr.io/madmatt112/guestbook
      - name: env
        value: dev
      - name: targetBranch
        value: env/dev
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: ${{ vars.targetBranch }}
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: kustomize-set-image
        as: update-image
        config:
          path: ./src/app/quickstart/guestbook/env/${{ vars.env }}
          images:
          - image: ${{ vars.imageRepo }}
            tag: ${{ imageFrom(vars.imageRepo).Tag }}
      - uses: kustomize-build
        config:
          path: ./src/app/quickstart/guestbook/env/${{ vars.env }}
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: ${{ outputs['update-image'].commitMessage }}
      - uses: git-push
        config:
          path: ./out
          targetBranch: ${{ vars.targetBranch }}
      # Fan out to EVERY dev cluster in one step. Kargo waits for all matched
      # Applications to reach this revision and go Healthy before the promotion
      # is considered successful.
      - uses: argocd-update
        config:
          apps:
          - selector:
              matchLabels:
                app: guestbook
                env: ${{ vars.env }}
            sources:
            - repoURL: ${{ vars.gitRepo }}
              desiredRevision: ${{ outputs.commit.commit }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: kargo-simple
  annotations:
    kargo.akuity.io/color: green
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: guestbook
    sources:
      # Freight must clear dev (all dev clusters) before it is eligible for prod.
      stages:
      - dev
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/madmatt112/here-be-akuity
      - name: imageRepo
        value: ghcr.io/madmatt112/guestbook
      - name: env
        value: prod
      - name: targetBranch
        value: env/prod
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: ${{ vars.targetBranch }}
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: kustomize-set-image
        as: update-image
        config:
          path: ./src/app/quickstart/guestbook/env/${{ vars.env }}
          images:
          - image: ${{ vars.imageRepo }}
            tag: ${{ imageFrom(vars.imageRepo).Tag }}
      - uses: kustomize-build
        config:
          path: ./src/app/quickstart/guestbook/env/${{ vars.env }}
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: ${{ outputs['update-image'].commitMessage }}
      - uses: git-push
        config:
          path: ./out
          targetBranch: ${{ vars.targetBranch }}
      # Fan out to EVERY prod cluster in one step.
      - uses: argocd-update
        config:
          apps:
          - selector:
              matchLabels:
                app: guestbook
                env: ${{ vars.env }}
            sources:
            - repoURL: ${{ vars.gitRepo }}
              desiredRevision: ${{ outputs.commit.commit }}
